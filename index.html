<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natberry 15 - Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f8f4;
            --card-bg: #ffffff;
            --inner-card: #f7faf6;
            --primary-dark: #082c16;
            --accent-lime: #8ec927;
            --accent-lime-hover: #7db320;
            --text-muted: #5a7363;
            --input-bg: #f4f8f4;
            --border-color: #e6eee5;
            --shadow: 0 8px 24px rgba(8, 44, 22, 0.05);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            color: var(--primary-dark);
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .app-title-container { text-align: center; margin-top: 8px; }
        .app-title { font-size: 24px; font-weight: 800; margin: 0 0 4px 0; }
        .app-subtitle { color: var(--text-muted); font-size: 13px; font-weight: 600; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; }
        
        label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; }

        input, select, textarea {
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            color: var(--primary-dark);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            background-color: var(--card-bg);
            border-color: var(--accent-lime);
        }

        .block-white-card {
            background-color: var(--inner-card);
            border-radius: var(--radius-md);
            padding: 14px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-header span { font-size: 13px; font-weight: 800; }

        .btn-group { display: flex; gap: 6px; }
        .btn-xs {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .scroll-list { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .grid-list { display: grid; grid-template-columns: repeat(2, 1fr); max-height: 140px; overflow-y: auto; gap: 8px; }

        .check-item {
            display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600;
            background: var(--card-bg); padding: 10px 12px; border-radius: var(--radius-sm);
            cursor: pointer; border: 1px solid var(--border-color);
        }
        .check-item:has(input:checked) { border-color: var(--accent-lime); background-color: rgba(142, 201, 39, 0.05); }
        .check-item input { width: 18px; height: 18px; accent-color: var(--accent-lime); margin: 0; }

        .measure-title { font-size: 12px; font-weight: 800; border-left: 3px solid var(--accent-lime); padding-left: 8px; margin-top: 14px;}
        .measure-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }

        .actions-container { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; margin-bottom: 24px; }
        
        .btn-submit {
            background: var(--accent-lime); color: var(--primary-dark); border: none;
            width: 100%; padding: 16px; border-radius: var(--radius-md);
            font-weight: 700; font-size: 15px; cursor: pointer;
            box-shadow: 0 6px 16px rgba(142, 201, 39, 0.2);
        }
        .btn-secondary {
            background-color: var(--primary-dark); color: white; border: none;
            padding: 14px; border-radius: var(--radius-md); font-weight: 600; font-size: 14px; cursor: pointer;
        }

        .sup-display { font-size: 11px; background-color: var(--primary-dark); color: white; padding: 4px 10px; border-radius: 20px; font-weight: 700; }

        /* DESIGN DES ONGLETS (TABS) DE FILTRAGE DES BLOCS */
        .bloc-tabs-container {
            display: flex;
            background-color: var(--inner-card);
            padding: 4px;
            border-radius: var(--radius-md);
            margin-bottom: 14px;
            border: 1px solid var(--border-color);
        }
        .bloc-tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        .bloc-tab-btn.active {
            background-color: var(--primary-dark);
            color: white;
        }

        /* TABLEAU DES ENTRÉES ENREGISTRÉES CÔTÉ UI */
        .records-wrapper { display: none; }
        .table-responsive { overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .ui-table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; text-align: left; }
        .ui-table th, .ui-table td { padding: 10px; border-bottom: 1px solid var(--border-color); }
        .ui-table th { background: var(--inner-card); font-weight: 700; }
        
        .btn-action-table {
            padding: 4px 8px; border-radius: 6px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin-right: 4px;
        }
        .btn-dl { background: var(--accent-lime); color: var(--primary-dark); }
        .btn-del { background: #ff4d4d; color: white; }

        /* ZONE MASQUÉE HAUTE QUALITÉ POUR L'EXPORTATION PNG DÉTAILLÉE */
        .hidden-capture-zone { position: absolute; left: -9999px; top: -9999px; }
        .premium-png-box { width: 500px; background: #082c16; color: white; padding: 25px; border-radius: 20px; font-family: Arial, sans-serif; }
        .png-header { text-align: center; border-bottom: 2px solid #8ec927; padding-bottom: 12px; margin-bottom: 15px; }
        .png-header h2 { margin: 0; color: #8ec927; font-size: 24px; letter-spacing: -0.5px; }
        .png-header p { margin: 5px 0 0 0; color: #a2c4ae; font-size: 13px; }
        
        .png-table { width: 100%; border-collapse: collapse; margin-top: 5px; margin-bottom: 20px; }
        .png-table th, .png-table td { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid #144525; text-align: left; }
        .png-table th { color: #8ec927; width: 40%; font-weight: 700; }
        .png-table td { color: #ffffff; font-weight: 600; }
        .png-divider { background: #0d3b1e; color: #8ec927; font-weight: 800; font-size: 13px; padding: 6px 10px; border-left: 4px solid #8ec927; }

        .global-card-spacing { border-top: 4px dashed #8ec927; margin-top: 25px; padding-top: 25px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="app-title-container">
            <h1 class="app-title">Natberry 15</h1>
            <p class="app-subtitle">Suivi Agronomique par Serre</p>
        </div>

        <div class="card form-grid-2">
            <div class="form-group"><label>Domaine</label><select id="domaine"><option value="NATBERRY 15">NATBERRY 15</option></select></div>
            <div class="form-group"><label>Date</label><input type="date" id="date"></div>
            <div class="form-group"><label>Culture</label><select id="culture"><option value="FRAMBOISE FRAIS">FRAMBOISE FRAIS</option><option value="FRAMBOISE INDUSTRIELLE">FRAMBOISE INDUSTRIELLE</option></select></div>
            <div class="form-group"><label>Variété</label><select id="variete">
                <option value="ADELITA" selected>ADELITA</option><option value="SIMONA">SIMONA</option><option value="PINK HUDSON">PINK HUDSON</option><option value="ABB">ABB</option><option value="AMALIA ROSA">AMALIA ROSA</option><option value="STELLA">STELLA</option>
            </select></div>
        </div>

        <div class="card">
            <div class="block-white-card">
                <div class="card-header"><span>BLOCS</span><div class="btn-group"><button class="btn-xs" onclick="selectAll('bloc')">Tout</button><button class="btn-xs" onclick="clearAll('bloc')">Vider</button></div></div>
                <div class="scroll-list" id="list-blocs"></div>
            </div>
            <div class="block-white-card">
                <div class="card-header"><span>PARCELLES</span><div class="btn-group"><button class="btn-xs" onclick="selectAll('parcelle')">Tout</button><button class="btn-xs" onclick="clearAll('parcelle')">Vider</button></div></div>
                <div class="scroll-list" id="list-parcelles"></div>
            </div>
            <div class="block-white-card">
                <div class="card-header"><span>SERRES SELECTIONNÉES</span><span class="sup-display" id="superficie">0.00 HA</span><div class="btn-group"><button class="btn-xs" onclick="selectAll('serre')">Tout</button><button class="btn-xs" onclick="clearAll('serre')">Vider</button></div></div>
                <div class="grid-list" id="list-serres"></div>
            </div>
        </div>

        <div class="card" style="display:flex; flex-direction:column; gap:12px;">
            <div class="form-group"><label>Programme de Fertilisation</label><select id="programme-fert">
                <option value="">-- Choisir --</option><option value="Programme vegetative (azote)">Programme végétale (azoté)</option><option value="Injection">Injection</option><option value="Programme generative (potassique)">Programme générative (potassique)</option><option value="Lessivage">Lessivage</option>
            </select></div>
            <div class="form-grid-2">
                <div class="form-group"><label>Vol. Irrigation (L)</label><input type="number" step="0.01" id="vol-irrigation" placeholder="1500"></div>
                <div class="form-group"><label>Temps (Min)</label><input type="number" id="temps-irrigation" placeholder="100"></div>
            </div>
            <div class="form-group"><label>EC Eau Clair (Bassin)</label><input type="number" step="0.01" id="ec-eau-clair" placeholder="0.4"></div>

            <div class="measure-title">EC & PH APPORT / SUBSTRAT / DRAINAT</div>
            <div class="form-grid-2">
                <div class="form-group"><label>PH Goutteur</label><input type="number" step="0.1" id="ph-apport" placeholder="5.8"></div>
                <div class="form-group"><label>EC Goutteur</label><input type="number" step="0.01" id="ec-apport" placeholder="2.2"></div>
                <div class="form-group"><label>PH Substrat</label><input type="number" step="0.1" id="ph-substrat" placeholder="6.2"></div>
                <div class="form-group"><label>EC Substrat</label><input type="number" step="0.01" id="ec-substrat" placeholder="2.6"></div>
                <div class="form-group"><label>PH Drainât</label><input type="number" step="0.1" id="ph-drainat" placeholder="5.7"></div>
                <div class="form-group"><label>EC Drainât</label><input type="number" step="0.01" id="ec-drainat" placeholder="2.0"></div>
            </div>

            <div class="measure-title">DRAINAGE QUANTITATIF</div>
            <div class="form-grid-2">
                <div class="form-group"><label>Vol. Irrigué (ML)</label><input type="number" id="vol-irrigue-ml" placeholder="1500"></div>
                <div class="form-group"><label>Vol. Drainé (ML)</label><input type="number" id="vol-draine-ml" placeholder="3500"></div>
            </div>
            <div class="form-group"><label>Taux de Drainage (%)</label><input type="text" id="taux-drainage" readonly style="text-align:center; font-weight:700;"></div>
            <div class="form-group"><label>Observation</label><textarea id="observation" rows="2" placeholder="Notes..."></textarea></div>
        </div>

        <div class="actions-container">
            <button class="btn-submit" onclick="enregistrerParSerre()">Enregistrer dans la Liste 📥</button>
            <button class="btn-secondary" onclick="toggleRecordsView()">Voir les Résultats des Entrées (<span id="count-lbl">0</span>) 👁️</button>
        </div>

        <div class="card records-wrapper" id="records-box">
            
            <div class="bloc-tabs-container">
                <button class="bloc-tab-btn active" id="tab-BLOC A" onclick="switchBlocTab('BLOC A')">BLOC A</button>
                <button class="bloc-tab-btn" id="tab-BLOC B" onclick="switchBlocTab('BLOC B')">BLOC B</button>
                <button class="bloc-tab-btn" id="tab-BLOC C" onclick="switchBlocTab('BLOC C')">BLOC C</button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span style="font-weight:800; font-size:13px; color:var(--primary-dark);" id="bloc-title-indicator">LISTE : BLOC A</span>
                <button class="btn-xs" style="background:#082c16; color:white; border-color:#082c16;" onclick="telechargerFichesDuBlocActuel()">Télécharger ce Bloc en PNG 🖼️</button>
            </div>

            <div class="table-responsive">
                <table class="ui-table">
                    <thead>
                        <tr>
                            <th>Serre (Date)</th>
                            <th>Variété</th>
                            <th>EC App/Drn</th>
                            <th>% Drn</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body-rows"></tbody>
                </table>
            </div>
        </div>

    </div>

    <div class="hidden-capture-zone">
        <div id="single-report-png" class="premium-png-box">
            <div class="png-header"><h2 id="p-title">NATBERRY 15</h2><p>Rapport de Suivi Agronomique</p></div>
            <table class="png-table" id="single-table-content"></table>
        </div>

        <div id="global-fiches-png" style="width: 500px; background: #082c16; padding: 20px; border-radius: 20px;">
            <div class="png-header" style="border-bottom: 2px solid #8ec927; text-align: center; padding-bottom: 12px; margin-bottom: 15px;">
                <h2 style="color: #8ec927; margin: 0; font-family: Arial; font-size: 24px;" id="global-png-main-title">NATBERRY 15</h2>
                <p style="color: #a2c4ae; margin: 5px 0 0 0; font-family: Arial; font-size: 13px;" id="global-png-subtitle">Rapport Complet Détaillé</p>
            </div>
            <div id="global-fiches-container"></div>
        </div>
    </div>

    <script>
        const STRUCT = {
            "BLOC A": {
                "800": { "S 01": 1.12, "S 02": 0.96, "S 03": 0.96, "S 04": 0.96, "S 05": 0.96 },
                "801": { "S 06": 0.96, "S 07": 0.96, "S 08": 0.96, "S 09": 0.96, "S 10": 1.12 }
            },
            "BLOC B": {
                "802": { "S 11": 1.20, "S 12": 0.88, "S 13": 0.88, "S 14": 0.88, "S 15": 0.90 },
                "803": { "S 16": 0.90, "S 17": 0.90, "S 18": 0.91, "S 19": 1.14, "S 20": 1.14 }
            },
            "BLOC C": {
                "804": { "S 21": 1.00, "S 22": 0.89, "S 23": 0.80, "S 24": 0.80, "S 25": 0.32, "S 26": 0.83 },
                "805": { "S 27": 0.90, "S 28": 0.91, "S 29": 0.99, "S 30": 1.12, "S 31": 1.12 }
            }
        };

        let db = JSON.parse(localStorage.getItem('natberry_serres_db')) || [];
        let currentActiveBlocTab = "BLOC A"; // Bloc affiché par défaut

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('date').valueAsDate = new Date();
            initBlocs();
            updateCountLabel();
            document.getElementById('vol-irrigue-ml').addEventListener('input', calculTauxDrainage);
            document.getElementById('vol-draine-ml').addEventListener('input', calculTauxDrainage);
        });

        function initBlocs() {
            document.getElementById('list-blocs').innerHTML = Object.keys(STRUCT).map(b => `<label class="check-item"><input type="checkbox" name="bloc" value="${b}" onchange="updateParcelles()"> ${b}</label>`).join('');
        }

        function updateParcelles() {
            const blocs = Array.from(document.querySelectorAll('input[name="bloc"]:checked')).map(cb => cb.value);
            let parcelles = [];
            blocs.forEach(b => parcelles = parcelles.concat(Object.keys(STRUCT[b])));
            document.getElementById('list-parcelles').innerHTML = parcelles.map(p => `<label class="check-item"><input type="checkbox" name="parcelle" value="${p}" onchange="updateSerres()"> Parcelle ${p}</label>`).join('');
            document.getElementById('list-serres').innerHTML = '';
            updateSuperficie();
        }

        function updateSerres() {
            const parcelles = Array.from(document.querySelectorAll('input[name="parcelle"]:checked')).map(cb => cb.value);
            let serres = [];
            Object.keys(STRUCT).forEach(b => Object.keys(STRUCT[b]).forEach(p => {
                if(parcelles.includes(p)) Object.keys(STRUCT[b][p]).forEach(s => serres.push({ name: s, sup: STRUCT[b][p][s], parc: p, bloc: b }));
            }));
            document.getElementById('list-serres').innerHTML = serres.map(s => `<label class="check-item"><input type="checkbox" name="serre" value="${s.name}" data-sup="${s.sup}" data-parc="${s.parc}" data-bloc="${s.bloc}" onchange="updateSuperficie()"> ${s.name}</label>`).join('');
            updateSuperficie();
        }

        function updateSuperficie() {
            let total = 0;
            document.querySelectorAll('input[name="serre"]:checked').forEach(cb => total += parseFloat(cb.getAttribute('data-sup')));
            document.getElementById('superficie').innerText = total.toFixed(2) + " HA";
        }

        function selectAll(type) { document.querySelectorAll(`input[name="${type}"]`).forEach(cb => { cb.checked = true; cb.dispatchEvent(new Event('change')); }); }
        function clearAll(type) { document.querySelectorAll(`input[name="${type}"]`).forEach(cb => { cb.checked = false; cb.dispatchEvent(new Event('change')); }); }

        function calculTauxDrainage() {
            const vi = parseFloat(document.getElementById('vol-irrigue-ml').value);
            const vd = parseFloat(document.getElementById('vol-draine-ml').value);
            document.getElementById('taux-drainage').value = (vi > 0 && !isNaN(vd)) ? ((vd / vi) * 100).toFixed(1) + " %" : "";
        }

        function enregistrerParSerre() {
            const serresCochees = Array.from(document.querySelectorAll('input[name="serre"]:checked'));
            if(serresCochees.length === 0) { alert("Veuillez sélectionner au moins une serre !"); return; }

            serresCochees.forEach(cb => {
                db.push({
                    id: Date.now() + Math.random(),
                    date: document.getElementById('date').value,
                    domaine: document.getElementById('domaine').value,
                    culture: document.getElementById('culture').value,
                    variete: document.getElementById('variete').value,
                    bloc: cb.getAttribute('data-bloc'),
                    parcelle: cb.getAttribute('data-parc'),
                    serre: cb.value,
                    superficie: cb.getAttribute('data-sup') + " HA",
                    progFert: document.getElementById('programme-fert').value || "-",
                    volIrr: document.getElementById('vol-irrigation').value || "-",
                    tempsIrr: document.getElementById('temps-irrigation').value || "-",
                    ecBassin: document.getElementById('ec-eau-clair').value || "-",
                    phApport: document.getElementById('ph-apport').value || "-",
                    ecApport: document.getElementById('ec-apport').value || "-",
                    phSubstrat: document.getElementById('ph-substrat').value || "-",
                    ecSubstrat: document.getElementById('ec-substrat').value || "-",
                    phDrainat: document.getElementById('ph-drainat').value || "-",
                    ecDrainat: document.getElementById('ec-drainat').value || "-",
                    volIrrigueMl: document.getElementById('vol-irrigue-ml').value || "-",
                    volDraineMl: document.getElementById('vol-draine-ml').value || "-",
                    tauxDrainage: document.getElementById('taux-drainage').value || "-",
                    observation: document.getElementById('observation').value || "Aucune"
                });
            });

            localStorage.setItem('natberry_serres_db', JSON.stringify(db));
            updateCountLabel();
            renderTableRows();
            alert(`${serresCochees.length} serre(s) ajoutée(s) !`);
        }

        function updateCountLabel() { document.getElementById('count-lbl').innerText = db.length; }

        function toggleRecordsView() {
            const box = document.getElementById('records-box');
            box.style.display = (box.style.display === "block") ? "none" : "block";
            if(box.style.display === "block") renderTableRows();
        }

        // CHANGER D'ONGLET DE BLOC
        function switchBlocTab(blocName) {
            currentActiveBlocTab = blocName;
            document.querySelectorAll('.bloc-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${blocName}`).classList.add('active');
            document.getElementById('bloc-title-indicator').innerText = `LISTE : ${blocName}`;
            renderTableRows();
        }

        // COULER LES LIGNES UNIQUEMENT DU BLOC SÉLECTIONNÉ
        function renderTableRows() {
            const tbody = document.getElementById('table-body-rows');
            
            // Filtrer la base de données locale selon le bloc actif
            const filteredData = db.filter(r => r.bloc === currentActiveBlocTab);

            if(filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:20px;">Aucune donnée pour le ${currentActiveBlocTab}.</td></tr>`;
                return;
            }

            tbody.innerHTML = filteredData.map(r => `
                <tr>
                    <td><span style="color:var(--accent-lime-hover); font-weight:800; font-size:13px;">${r.serre}</span><br><small style="color:var(--text-muted);">${r.date}</small></td>
                    <td>${r.variete}<br><small>P. ${r.parcelle}</small></td>
                    <td>${r.ecApport} / ${r.ecDrainat}</td>
                    <td style="font-weight:700;">${r.tauxDrainage}</td>
                    <td>
                        <button class="btn-action-table btn-dl" onclick="telechargerPNGIndividuel(${r.id})">Fiche</button>
                        <button class="btn-action-table btn-del" onclick="supprimerLigne(${r.id})">X</button>
                    </td>
                </tr>
            `).join('');
        }

        function supprimerLigne(id) {
            db = db.filter(r => r.id !== id);
            localStorage.setItem('natberry_serres_db', JSON.stringify(db));
            updateCountLabel(); 
            renderTableRows();
        }

        function genererCodeHtmlTableau(r) {
            return `
                <tr class="png-divider"><td colspan="2">${r.bloc} - PARCELLE ${r.parcelle} - SERRE ${r.serre}</td></tr>
                <tr><th>Date & Variété</th><td>${r.date} | ${r.variete} (${r.superficie})</td></tr>
                <tr><th>Prog. Fertilisation</th><td>${r.progFert}</td></tr>
                <tr><th>Irrigation (Vol / Temps)</th><td>${r.volIrr} L / ${r.tempsIrr} Min (EC Bassin: ${r.ecBassin})</td></tr>
                <tr><th>Goutteur (PH / EC)</th><td>PH: ${r.phApport} | EC: ${r.ecApport}</td></tr>
                <tr><th>Substrat (PH / EC)</th><td>PH: ${r.phSubstrat} | EC: ${r.ecSubstrat}</td></tr>
                <tr><th>Drainât (PH / EC)</th><td>PH: ${r.phDrainat} | EC: ${r.ecDrainat}</td></tr>
                <tr><th>Drainage (Vol / Taux)</th><td>Irr: ${r.volIrrigueMl} mL | Drn: ${r.volDraineMl} mL -> <strong>${r.tauxDrainage}</strong></td></tr>
                <tr><th>Observation</th><td style="font-style:italic; color:#a2c4ae;">${r.observation}</td></tr>
            `;
        }

        function telechargerPNGIndividuel(id) {
            const r = db.find(item => item.id === id);
            if(!r) return;
            document.getElementById('p-title').innerText = `NATBERRY 15 - ${r.serre}`;
            document.getElementById('single-table-content').innerHTML = genererCodeHtmlTableau(r);

            html2canvas(document.getElementById('single-report-png'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Fiche_Detaillee_${r.serre}_${r.date}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // TÉLÉCHARGER UNIQUEMENT LE BLOC SÉLECTIONNÉ EN IMAGE 
        function telechargerFichesDuBlocActuel() {
            const filteredData = db.filter(r => r.bloc === currentActiveBlocTab);

            if(filteredData.length === 0) { 
                alert(`Aucune donnée enregistrée dans le ${currentActiveBlocTab} à exporter !`); 
                return; 
            }

            // Mettre à jour les titres sur l'image finale
            document.getElementById('global-png-main-title').innerText = `NATBERRY 15 - ${currentActiveBlocTab}`;
            document.getElementById('global-png-subtitle').innerText = `Rapport Détaillé des Serres du ${currentActiveBlocTab}`;

            const globalContainer = document.getElementById('global-fiches-container');
            globalContainer.innerHTML = ""; // Vider l'ancien contenu cache

            // Empiler uniquement les fiches du bloc actif
            filteredData.forEach((r, index) => {
                const subTable = document.createElement('table');
                subTable.className = "png-table";
                if(index > 0) subTable.className += " global-card-spacing";
                
                subTable.innerHTML = genererCodeHtmlTableau(r);
                globalContainer.appendChild(subTable);
            });

            // Lancement de la capture
            html2canvas(document.getElementById('global-fiches-png'), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Rapport_Detaille_${currentActiveBlocTab.replace(" ", "_")}_${new Date().toISOString().slice(0,10)}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
